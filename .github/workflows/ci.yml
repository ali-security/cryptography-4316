name: CI
on:
  pull_request: {}
  push:
    branches:
      - main
      - '*.*.x'
    tags:
      - '*.*'
      - '*.*.*'

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true


jobs:
  linux:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        PYTHON:
          - {VERSION: "3.9", TOXENV: "flake", COVERAGE: "false"}
          - {VERSION: "3.9", TOXENV: "rust", COVERAGE: "false"}
          - {VERSION: "pypy-3.6", TOXENV: "pypy3-nocoverage", COVERAGE: "false"}
          - {VERSION: "pypy-3.7", TOXENV: "pypy3-nocoverage", COVERAGE: "false"}
          - {VERSION: "3.9", TOXENV: "py39", OPENSSL: {TYPE: "openssl", VERSION: "1.1.0l"}}
          - {VERSION: "3.9", TOXENV: "py39", OPENSSL: {TYPE: "openssl", VERSION: "1.1.1l"}}
          - {VERSION: "3.9", TOXENV: "py39-ssh", OPENSSL: {TYPE: "openssl", VERSION: "1.1.1l"}}
          - {VERSION: "3.9", TOXENV: "py39", OPENSSL: {TYPE: "openssl", VERSION: "1.1.1l", CONFIG_FLAGS: "no-engine no-rc2 no-srtp no-ct"}}
          - {VERSION: "3.9", TOXENV: "py39", OPENSSL: {TYPE: "openssl", VERSION: "3.0.0"}}
          - {VERSION: "3.9", TOXENV: "py39", TOXARGS: "--enable-fips=1", OPENSSL: {TYPE: "openssl", CONFIG_FLAGS: "enable-fips", VERSION: "3.0.0"}}
          - {VERSION: "3.9", TOXENV: "py39", OPENSSL: {TYPE: "libressl", VERSION: "2.9.2"}}
          - {VERSION: "3.9", TOXENV: "py39", OPENSSL: {TYPE: "libressl", VERSION: "3.0.2"}}
          - {VERSION: "3.9", TOXENV: "py39", OPENSSL: {TYPE: "libressl", VERSION: "3.1.5"}}
          - {VERSION: "3.9", TOXENV: "py39", OPENSSL: {TYPE: "libressl", VERSION: "3.2.6"}}
          - {VERSION: "3.9", TOXENV: "py39", OPENSSL: {TYPE: "libressl", VERSION: "3.3.4"}}
          - {VERSION: "3.10-dev", TOXENV: "py310"}
        RUST:
          - 1.55.0
    name: "${{ matrix.PYTHON.TOXENV }} ${{ matrix.PYTHON.OPENSSL.TYPE }} ${{ matrix.PYTHON.OPENSSL.VERSION }} ${{ matrix.PYTHON.TOXARGS }} ${{ matrix.PYTHON.OPENSSL.CONFIG_FLAGS }}"
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src/rust/target/
          key: ${{ runner.os }}-${{ matrix.PYTHON.VERSION }}-cargo-2-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup python
        uses: MatteoH2O1999/setup-python@v4
        with:
          python-version: ${{ matrix.PYTHON.VERSION }}
      - uses: actions-rs/toolchain@v1.0.7
        with:
          profile: minimal
          toolchain: ${{ matrix.RUST }}
          override: true
          default: true
      - uses: actions/checkout@v4
        with:
          repository: "google/wycheproof"
          path: "wycheproof"
          ref: "2196000605e45d91097147c9c71f26b72af58003"
      - name: Configure pip index
        run: python -m pip config set global.index-url "https://:2021-09-29T19:27:51.000Z@time-machines-pypi.sealsecurity.io/"
      - run: python -m pip install tox requests coverage
      - run: rustup component add rustfmt
      - run: rustup component add clippy
      - name: Compute config hash and set config vars
        run: |
          DEFAULT_CONFIG_FLAGS="shared no-ssl2 no-ssl3"
          CONFIG_FLAGS="$DEFAULT_CONFIG_FLAGS $CONFIG_FLAGS"
          CONFIG_HASH=$(echo "$CONFIG_FLAGS" | sha1sum | sed 's/ .*$//')
          echo "CONFIG_FLAGS=${CONFIG_FLAGS}" >> $GITHUB_ENV
          echo "CONFIG_HASH=${CONFIG_HASH}" >> $GITHUB_ENV
          echo "OSSL_INFO=${{ matrix.PYTHON.OPENSSL.TYPE }}-${{ matrix.PYTHON.OPENSSL.VERSION }}-${CONFIG_FLAGS}" >> $GITHUB_ENV
          echo "OSSL_PATH=${{ github.workspace }}/osslcache/${{ matrix.PYTHON.OPENSSL.TYPE }}-${{ matrix.PYTHON.OPENSSL.VERSION }}-${CONFIG_HASH}" >> $GITHUB_ENV
        env:
          CONFIG_FLAGS: ${{ matrix.PYTHON.OPENSSL.CONFIG_FLAGS }}
        if: matrix.PYTHON.OPENSSL
      - name: Load cache
        uses: actions/cache@v4
        id: ossl-cache
        with:
          path: ${{ github.workspace }}/osslcache
          # When altering the openssl build process you may need to increment the value on the end of this cache key
          # so that you can prevent it from fetching the cache and skipping the build step.
          key: ${{ matrix.PYTHON.OPENSSL.TYPE }}-${{ matrix.PYTHON.OPENSSL.VERSION }}-${{ env.CONFIG_HASH }}-2
        if: matrix.PYTHON.OPENSSL
      - name: Build custom OpenSSL/LibreSSL
        run: .github/workflows/build_openssl.sh
        env:
          TYPE: ${{ matrix.PYTHON.OPENSSL.TYPE }}
          VERSION: ${{ matrix.PYTHON.OPENSSL.VERSION }}
        if: matrix.PYTHON.OPENSSL && steps.ossl-cache.outputs.cache-hit != 'true'
      - name: Set CFLAGS/LDFLAGS
        run: |
          echo "CFLAGS=${CFLAGS} -Werror=implicit-function-declaration -I${OSSL_PATH}/include" >> $GITHUB_ENV
          echo "LDFLAGS=${LDFLAGS} -L${OSSL_PATH}/lib -L${OSSL_PATH}/lib64 -Wl,-rpath=${OSSL_PATH}/lib -Wl,-rpath=${OSSL_PATH}/lib64" >> $GITHUB_ENV
        if: matrix.PYTHON.OPENSSL
      - name: Tests
        run: |
            tox -r --  --color=yes --wycheproof-root=wycheproof ${{ matrix.PYTHON.TOXARGS }}
        env:
          TOXENV: ${{ matrix.PYTHON.TOXENV }}
          CARGO_TARGET_DIR: ${{ format('{0}/src/rust/target/', github.workspace) }}
      - uses: ./.github/actions/upload-coverage
        with:
          name: "tox -e ${{ matrix.PYTHON.TOXENV }} ${{ env.OSSL_INFO }}"
        if: matrix.PYTHON.COVERAGE != 'false'

  linux-distros:
    runs-on: ubuntu-22.04
    container: ${{ matrix.IMAGE.CONTAINER || format('ghcr.io/pyca/cryptography-runner-{0}', matrix.IMAGE.IMAGE) }}
    strategy:
      fail-fast: false
      matrix:
        IMAGE:
          - {IMAGE: "centos-stream9", TOXENV: "py36"}
          - {IMAGE: "centos-stream9-fips", TOXENV: "py36", FIPS: true}
          - {IMAGE: "buster", TOXENV: "py37"}
          - {IMAGE: "bullseye", TOXENV: "py39"}
          - {IMAGE: "sid", TOXENV: "py39"}
          - {IMAGE: "ubuntu-bionic", TOXENV: "py36", CONTAINER: "ubuntu:20.04"}
          - {IMAGE: "ubuntu-focal", TOXENV: "py38"}
          - {IMAGE: "ubuntu-rolling", TOXENV: "py39"}
          - {IMAGE: "ubuntu-rolling", TOXENV: "py39-randomorder"}
          - {IMAGE: "fedora", TOXENV: "py39"}
          - {IMAGE: "alpine", TOXENV: "py39"}
    name: "${{ matrix.IMAGE.TOXENV }} on ${{ matrix.IMAGE.IMAGE }}"
    timeout-minutes: 20
    steps:
      - name: install dependencies
        shell: bash
        env:
          TOXENV: ${{ matrix.IMAGE.TOXENV }}
        run: |
          set -x
          # Derive 3.X from TOXENV (py36 -> 3.6, py39-randomorder -> 3.9)
          PY=$(echo "${TOXENV}" | sed -E 's/^py([0-9])([0-9]+).*/\1.\2/')
          PYNODOT=$(echo "${PY}" | tr -d .)

          # Some distros (notably Debian buster) are EOL and have moved
          # to archive.debian.org; rewrite sources.list before update so
          # apt-get install can actually find packages.
          if [ -f /etc/debian_version ] && [ -f /etc/apt/sources.list ]; then
            sed -i 's|http://deb.debian.org/debian-security|http://archive.debian.org/debian-security|g; s|http://security.debian.org|http://archive.debian.org/debian-security|g; s|http://deb.debian.org|http://archive.debian.org|g' /etc/apt/sources.list || true
            for f in /etc/apt/sources.list.d/*.list; do
              [ -f "$f" ] && sed -i 's|http://deb.debian.org|http://archive.debian.org|g; s|http://security.debian.org|http://archive.debian.org/debian-security|g' "$f" || true
            done
            echo 'Acquire::Check-Valid-Until "false";' > /etc/apt/apt.conf.d/99no-check-valid-until
          fi

          apt-get update -qq 2>/dev/null \
            || dnf -y -q makecache 2>/dev/null \
            || yum -y -q makecache 2>/dev/null \
            || microdnf -y update 2>/dev/null \
            || apk update 2>/dev/null \
            || true

          install_one() {
            apt-get install -y -qq "$1" 2>/dev/null \
              || dnf install -y -q "$1" 2>/dev/null \
              || yum install -y -q "$1" 2>/dev/null \
              || microdnf install -y "$1" 2>/dev/null \
              || apk add --no-cache "$1" 2>/dev/null \
              || true
          }
          install() {
            # install each package individually so one missing name doesn't
            # poison the whole batch on rpm-based distros.
            for pkg in "$@"; do install_one "$pkg"; done
          }

          # Try the matrix's exact Python version via every common package
          # name across the supported distros. Older Pythons on newer
          # distros may need an extra repo (deadsnakes / EPEL / SCL); we
          # still attempt and fall back to a pyenv source build below.
          install "python${PY}" "python${PY}-dev" "python${PY}-distutils" "python${PY}-venv"
          install "python${PYNODOT}" "python${PYNODOT}-devel" "python${PYNODOT}-pip"
          install "py${PYNODOT}-pip"

          # Add deadsnakes for Ubuntu/Debian when the version isn't in the
          # default repos.
          if ! command -v "python${PY}" >/dev/null 2>&1; then
            if command -v apt-get >/dev/null 2>&1; then
              install software-properties-common gnupg ca-certificates curl lsb-release
              add-apt-repository -y ppa:deadsnakes/ppa 2>/dev/null || true
              apt-get update -qq 2>/dev/null || true
              install "python${PY}" "python${PY}-dev" "python${PY}-distutils" "python${PY}-venv"
            fi
          fi

          # Last resort: build the requested Python from source via pyenv.
          if ! command -v "python${PY}" >/dev/null 2>&1; then
            install build-essential gcc make patch curl ca-certificates git \
              libssl-dev openssl-devel libffi-dev libffi-devel \
              zlib1g-dev zlib-devel zlib-dev \
              libbz2-dev bzip2-devel bzip2-dev \
              libreadline-dev readline-devel readline-dev \
              libsqlite3-dev sqlite-devel sqlite-dev \
              liblzma-dev xz-devel xz-dev linux-headers
            curl -fsSL https://pyenv.run | bash || true
            export PYENV_ROOT="${HOME}/.pyenv"
            export PATH="${PYENV_ROOT}/bin:${PATH}"
            eval "$(pyenv init -)" 2>/dev/null || true
            # Pick the latest patch for the requested 3.X line.
            PATCH=$(pyenv install --list 2>/dev/null | awk -v v="${PY}" '$0 ~ "^[[:space:]]*"v"\\."{gsub(/^[[:space:]]+/, ""); print}' | grep -vE '[a-zA-Z]' | tail -1)
            pyenv install -s "${PATCH:-${PY}.15}"
            pyenv global "${PATCH:-${PY}.15}"
            ln -sf "${PYENV_ROOT}/versions/${PATCH:-${PY}.15}/bin/python${PY}" /usr/local/bin/"python${PY}"
          fi

          # tooling used by later steps
          install pwsh
          install sudo
          install python3-coverage python3-wheel python3-cffi python3-setuptools-rust

          # Always install tox via the matrix's python so the .pkg env tox
          # builds uses python${PY}, not the distro's default (e.g. fedora
          # 43 ships python3.14 which trips on cryptography 35.0.0's old
          # build backend). Don't upgrade pip — pip>=21.3 enforces PEP 660
          # which the vectors package's setup.py doesn't satisfy.
          if ! "python${PY}" -m pip --version >/dev/null 2>&1; then
            curl -fsSL https://bootstrap.pypa.io/pip/${PY}/get-pip.py -o /tmp/get-pip.py 2>/dev/null \
              || curl -fsSL https://bootstrap.pypa.io/get-pip.py -o /tmp/get-pip.py
            "python${PY}" /tmp/get-pip.py || true
          fi
          "python${PY}" -m pip install tox coverage

          "python${PY}" --version
          "python${PY}" -m tox --version
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src/rust/target/
          key: ${{ runner.os }}-${{ matrix.IMAGE.IMAGE }}-cargo-2-${{ hashFiles('**/Cargo.lock') }}

      - uses: actions/checkout@v4
        with:
          repository: "google/wycheproof"
          path: "wycheproof"
          ref: "2196000605e45d91097147c9c71f26b72af58003"
      - run: |
          echo "OPENSSL_FORCE_FIPS_MODE=1" >> $GITHUB_ENV
          echo "CFLAGS=-DUSE_OSRANDOM_RNG_FOR_TESTING" >> $GITHUB_ENV
        if: matrix.IMAGE.FIPS
      - name: Set rust
        if: matrix.PYTHON.RUST
        run: |
          rustup default ${{ matrix.PYTHON.RUST }}
          rustup component add rustfmt
          rustup component add clippy
      - name: Configure pip index
        shell: bash
        env:
          TOXENV: ${{ matrix.IMAGE.TOXENV }}
        run: |
          PY=$(echo "${TOXENV}" | sed -E 's/^py([0-9])([0-9]+).*/\1.\2/')
          "python${PY}" -m pip config set global.index-url "https://:2021-09-29T19:27:51.000Z@time-machines-pypi.sealsecurity.io/"
      - shell: bash
        env:
          TOXENV: ${{ matrix.IMAGE.TOXENV }}
        run: |
          PY=$(echo "${TOXENV}" | sed -E 's/^py([0-9])([0-9]+).*/\1.\2/')
          "python${PY}" -m pip install wheel cffi setuptools-rust || true
      - shell: bash
        env:
          TOXENV: ${{ matrix.IMAGE.TOXENV }}
          RUSTUP_HOME: /root/.rustup
          CARGO_TARGET_DIR: ${{ format('{0}/src/rust/target/', github.workspace) }}
        run: |
          PY=$(echo "${TOXENV}" | sed -E 's/^py([0-9])([0-9]+).*/\1.\2/')
          "python${PY}" -m tox -- --wycheproof-root="wycheproof"
      - uses: ./.github/actions/upload-coverage
        with:
          name: "${{ matrix.IMAGE.TOXENV }} on ${{ matrix.IMAGE.IMAGE }}"

  linux-rust:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        PYTHON:
          - {VERSION: "3.9", TOXENV: "py39"}
        RUST:
          # Cover MSRV (and likely next MSRV) and in-dev versions
          - 1.41.0
          - 1.45.0
          - beta
          - nightly
    name: "${{ matrix.PYTHON.TOXENV }} with Rust ${{ matrix.RUST }}"
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src/rust/target/
          key: ${{ runner.os }}-cargo-2-${{ hashFiles('**/Cargo.lock') }}-${{ matrix.RUST }}

      - name: Setup python
        uses: MatteoH2O1999/setup-python@v4
        with:
          python-version: ${{ matrix.PYTHON.VERSION }}
      - uses: actions-rs/toolchain@v1.0.7
        with:
          profile: minimal
          toolchain: ${{ matrix.RUST }}
          override: true
          default: true
      - uses: actions/checkout@v4
        with:
          repository: "google/wycheproof"
          path: "wycheproof"
          ref: "2196000605e45d91097147c9c71f26b72af58003"
      - name: Configure pip index
        run: python -m pip config set global.index-url "https://:2021-09-29T19:27:51.000Z@time-machines-pypi.sealsecurity.io/"
      - run: python -m pip install tox coverage
      - name: Tests
        run: |
            tox -r --  --color=yes --wycheproof-root=wycheproof
        env:
          TOXENV: ${{ matrix.PYTHON.TOXENV }}
          CARGO_TARGET_DIR: ${{ format('{0}/src/rust/target/', github.workspace) }}
      - uses: ./.github/actions/upload-coverage
        with:
          name: "${{ matrix.PYTHON.TOXENV }} with Rust ${{ matrix.RUST }}"

  linux-rust-coverage:
    runs-on: ubuntu-22.04
    name: "Rust Coverage"
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/cache@v4
        id: cargo-cache
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src/rust/target/
          key: ${{ runner.os }}-cargo-2-${{ hashFiles('**/Cargo.lock') }}-rust-nightly-coverage

      - name: Setup python
        uses: MatteoH2O1999/setup-python@v4
        with:
          python-version: 3.9
      - uses: actions-rs/toolchain@v1.0.7
        with:
          profile: minimal
          toolchain: nightly
          override: true
          default: true
          components: llvm-tools-preview
      - uses: actions-rs/install@v0.1.2
        with:
          crate: cargo-binutils
          version: latest
        if: steps.cargo-cache.outputs.cache-hit != 'true'

      - uses: actions/checkout@v4
        with:
          repository: "google/wycheproof"
          path: "wycheproof"
          ref: "2196000605e45d91097147c9c71f26b72af58003"
      - name: Configure pip index
        run: python -m pip config set global.index-url "https://:2021-09-29T19:27:51.000Z@time-machines-pypi.sealsecurity.io/"
      - run: python -m pip install tox coverage
      - name: Tests
        run: |
            tox -r --  --color=yes --wycheproof-root=wycheproof
        env:
          TOXENV: py39
          CARGO_TARGET_DIR: ${{ format('{0}/src/rust/target/', github.workspace) }}
          RUSTFLAGS: "-Zinstrument-coverage"
          LLVM_PROFILE_FILE: "rust-cov/cov-%p.profraw"
      - name: Process coverage data
        run: |
            cd src/rust/
            cargo profdata -- merge -sparse ../../rust-cov/*.profraw -o rust-cov.profdata
            cargo cov -- export ../../.tox/py39/lib/python3.9/site-packages/cryptography/hazmat/bindings/_rust.abi3.so \
              -instr-profile=rust-cov.profdata \
              --ignore-filename-regex='/.cargo/registry' \
              --ignore-filename-regex='/rustc/' \
              --ignore-filename-regex='/.rustup/toolchains/' --format=lcov > ../../rust-cov.lcov

            sed -E -i 's/SF:src\/(.*)/SF:src\/rust\/src\/\1/g' ../../rust-cov.lcov

      - uses: ./.github/actions/upload-coverage
        with:
          name: "Rust Coverage"


  macos:
    runs-on: macos-13
    strategy:
      fail-fast: false
      matrix:
        PYTHON:
          - {VERSION: "3.6", TOXENV: "py36", EXTRA_CFLAGS: ""}
          - {VERSION: "3.9", TOXENV: "py39", EXTRA_CFLAGS: "-DUSE_OSRANDOM_RNG_FOR_TESTING"}
        RUST:
          - stable
    name: "${{ matrix.PYTHON.TOXENV }} on macOS"
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src/rust/target/
          key: ${{ runner.os }}-${{ matrix.PYTHON.VERSION }}-cargo-2-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup python
        uses: MatteoH2O1999/setup-python@v4
        with:
          python-version: ${{ matrix.PYTHON.VERSION }}
      - uses: actions-rs/toolchain@v1.0.7
        with:
          profile: minimal
          toolchain: ${{ matrix.RUST }}
          override: true
          default: true

      - name: Configure pip index
        run: python -m pip config set global.index-url "https://:2021-09-29T19:27:51.000Z@time-machines-pypi.sealsecurity.io/"
      - run: python -m pip install tox requests coverage

      - uses: actions/checkout@v4
        with:
          repository: "google/wycheproof"
          path: "wycheproof"
          ref: "2196000605e45d91097147c9c71f26b72af58003"

      - name: Download OpenSSL
        run: |
          python .github/workflows/download_openssl.py macos openssl-macos-x86-64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Tests
        run: |
          CRYPTOGRAPHY_SUPPRESS_LINK_FLAGS=1 \
            LDFLAGS="${HOME}/openssl-macos-x86-64/lib/libcrypto.a ${HOME}/openssl-macos-x86-64/lib/libssl.a" \
            CFLAGS="-I${HOME}/openssl-macos-x86-64/include -Werror -Wno-error=deprecated-declarations -Wno-error=incompatible-pointer-types-discards-qualifiers -Wno-error=unused-function -Wno-error=unused-command-line-argument -mmacosx-version-min=10.10 -march=core2 $EXTRA_CFLAGS" \
            tox -r --  --color=yes --wycheproof-root=wycheproof
        env:
          TOXENV: ${{ matrix.PYTHON.TOXENV }}
          EXTRA_CFLAGS: ${{ matrix.PYTHON.EXTRA_CFLAGS }}
          CARGO_TARGET_DIR: ${{ format('{0}/src/rust/target/', github.workspace) }}

      - uses: ./.github/actions/upload-coverage
        with:
          name: "${{ matrix.PYTHON.TOXENV }} on macOS"

  windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        WINDOWS:
          - {ARCH: 'x86', WINDOWS: 'win32', RUST_TRIPLE: 'i686-pc-windows-msvc'}
          - {ARCH: 'x64', WINDOWS: 'win64', RUST_TRIPLE: 'x86_64-pc-windows-msvc'}
        PYTHON:
          - {VERSION: "3.6", TOXENV: "py36", MSVC_VERSION: "2019", CL_FLAGS: ""}
          - {VERSION: "3.9", TOXENV: "py39", MSVC_VERSION: "2019", CL_FLAGS: "/D USE_OSRANDOM_RNG_FOR_TESTING"}
        RUST:
          - stable
        JOB_NUMBER: [0, 1, 2, 3]
    name: "${{ matrix.PYTHON.TOXENV }} on ${{ matrix.WINDOWS.WINDOWS }} (part ${{ matrix.JOB_NUMBER }})"
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Setup python
        id: setup-python
        uses: MatteoH2O1999/setup-python@v4
        with:
          python-version: ${{ matrix.PYTHON.VERSION }}
          architecture: ${{ matrix.WINDOWS.ARCH }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src/rust/target/
          key: ${{ runner.os }}-${{ matrix.WINDOWS.ARCH }}-${{ steps.setup-python.outputs.python-version }}-cargo-2-${{ hashFiles('**/Cargo.lock') }}

      - uses: actions-rs/toolchain@v1.0.7
        with:
          profile: minimal
          toolchain: ${{ matrix.RUST }}
          override: true
          default: true
          target: ${{ matrix.WINDOWS.RUST_TRIPLE }}

      - name: Configure pip index
        run: python -m pip config set global.index-url "https://:2021-09-29T19:27:51.000Z@time-machines-pypi.sealsecurity.io/"
      - run: python -m pip install tox requests coverage
      - name: Download OpenSSL
        run: |
            python .github/workflows/download_openssl.py windows openssl-${{ matrix.WINDOWS.WINDOWS }}-${{ matrix.PYTHON.MSVC_VERSION }}
            echo "INCLUDE=C:/openssl-${{ matrix.WINDOWS.WINDOWS }}-${{ matrix.PYTHON.MSVC_VERSION }}/include;$INCLUDE" >> $GITHUB_ENV
            echo "LIB=C:/openssl-${{ matrix.WINDOWS.WINDOWS }}-${{ matrix.PYTHON.MSVC_VERSION }}/lib;$LIB" >> $GITHUB_ENV
            echo "CL=${{ matrix.PYTHON.CL_FLAGS }}" >> $GITHUB_ENV
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
      - uses: actions/checkout@v4
        with:
          repository: "google/wycheproof"
          path: "wycheproof"
          ref: "2196000605e45d91097147c9c71f26b72af58003"

      - run: tox -r -- --color=yes --wycheproof-root=wycheproof --num-shards=4 --shard-id=${{ matrix.JOB_NUMBER }}
        env:
          TOXENV: ${{ matrix.PYTHON.TOXENV }}
          CARGO_TARGET_DIR: ${{ format('{0}/src/rust/target/', github.workspace) }}

      - uses: ./.github/actions/upload-coverage
        with:
          name: "${{ matrix.PYTHON.TOXENV }} on ${{ matrix.WINDOWS.WINDOWS }} (part ${{ matrix.JOB_NUMBER }})"
